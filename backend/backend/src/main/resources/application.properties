spring.application.name=backend
spring.datasource.url=jdbc:mariadb://localhost:3306/sopra
spring.datasource.username=root
spring.datasource.password=${MARIADB_PW}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# Springboot Security Deactivated
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

spring.sendgrid.api-key=${GUSTAR_API_KEY}
api.host=gustar-io-deutsche-rezepte.p.rapidapi.com
