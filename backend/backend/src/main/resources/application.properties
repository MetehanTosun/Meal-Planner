spring.application.name=backend
spring.datasource.url=jdbc:mariadb://localhost:3306/sopra?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=1
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# Zusðtzliche Verbindungseinstellungen
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# Springboot Security Deactivated
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

# Hibernate Lazy Loading Settings.
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

# Optional: Jackson Settings
spring.jackson.serialization.fail-on-empty-beans=false

# Port Settings
server.port=8080
